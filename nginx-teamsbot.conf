worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    sendfile      on;

    # Long server_name values (e.g. bot.aws-practice.royalcyber.org) exceed default hash bucket.
    server_names_hash_bucket_size 64;

    # WebSockets + SSE (SignalR): do NOT use Connection "keep-alive" for all requests.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Drop scanners hitting the VM by IP or wrong Host (no redirect to HTTPS, no proxy to Kestrel).
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # nginx 1.19.4+: reject TLS for non-matching SNI so raw-IP / wrong-host HTTPS probes do not reach the app.
    server {
        listen 443 ssl default_server;
        ssl_reject_handshake on;
    }

    # HTTP: Let's Encrypt http-01 + redirect everything else to HTTPS
    server {
        listen 80;
        server_name bot.aws-practice.royalcyber.org;

        location /.well-known/acme-challenge/ {
            root C:/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS: reverse proxy to Kestrel (TeamsMediaBot on Bot:ListenUrl, default 5080). Media HTTP control uses Media:HttpControlPort (default 5000).
    server {
        listen 443 ssl;
        server_name bot.aws-practice.royalcyber.org;

        ssl_certificate      C:/nginx/certs/bot.aws-practice.royalcyber.org-crt.pem;
        ssl_certificate_key  C:/nginx/certs/bot.aws-practice.royalcyber.org-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # SignalR: buffering breaks SSE handshake; WebSockets need Upgrade + long timeouts.
        location /hubs/ {
            proxy_pass http://127.0.0.1:5080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://127.0.0.1:5080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
